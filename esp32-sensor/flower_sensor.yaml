esphome:
  name: flower-sensor
  friendly_name: Flower Sensor

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Flower-Sensor Setup"

captive_portal:

web_server:
  port: 80

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
    name: "Tradescantia Pallida"
    id: tradescantia

  - platform: gpio
    pin:
      number: GPIO1
      inverted: true
    name: "African Milk Bush"
    id: african_milk_bush

  - platform: gpio
    pin:
      number: GPIO2
      inverted: true
    name: "Spansk Timjan"
    id: spansk_timjan

  - platform: gpio
    pin:
      number: GPIO3
      inverted: true
    name: "Palettbladen"
    id: palettbladen
